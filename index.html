<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BFHL Tree Analyzer</title>
    <link rel="stylesheet" href="style.css">
<style> *{ margin:0; padding:0; box-sizing:border-box; } body{ font-family:Arial, Helvetica, sans-serif; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; } .container{ width:100%; max-width:900px; background:white; border-radius:15px; padding:30px; box-shadow:0 10px 30px rgba(0,0,0,0.2); } h1{ text-align:center; margin-bottom:20px; color:#333; } .subtitle{ text-align:center; margin-bottom:20px; color:#666; } textarea{ width:100%; height:180px; border:2px solid #ddd; border-radius:10px; padding:15px; font-size:16px; resize:none; outline:none; } textarea:focus{ border-color:#667eea; } button{ width:100%; margin-top:15px; padding:15px; border:none; border-radius:10px; background:#667eea; color:white; font-size:18px; cursor:pointer; transition:0.3s; } button:hover{ background:#4f5fd1; } .response-box{ margin-top:25px; } .response-box h2{ margin-bottom:10px; color:#333; } pre{ background:#f4f4f4; padding:15px; border-radius:10px; overflow:auto; min-height:200px; white-space:pre-wrap; word-wrap:break-word; } .footer{ margin-top:20px; text-align:center; color:#888; } </style>
</head>
<body>


<div class="container">

    <h1>BFHL Tree Analyzer</h1>

    <p>Enter edges in JSON format:</p>

    <textarea
        id="inputData"
        rows="10"
        placeholder='["A->B","A->C","B->D"]'></textarea>

    <button onclick="analyzeData()">
        Analyze
    </button>

    <h2>Response</h2>

    <pre id="output"></pre>

</div>

<script src="script.js"></script>

</body>
</html>
